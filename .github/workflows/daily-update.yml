name: Daily QuantMacro Update

on:
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Bootstrap source DB (if missing)
        run: |
          python3 scripts/ops/bootstrap_source_db.py \
            --project-root . \
            --source-db-path var/data/macro_events.db \
            --as-of-date "$(date -u +%F)" \
            --strict

      - name: Run OpenClaw backup pipeline
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python3 scripts/macro_pipeline/run_daily_ops.py \
            --project-root . \
            --strict \
            --push \
            --source-db-path var/data/macro_events.db \
            --bootstrap-if-missing
