name: Daily QuantMacro Update

on:
  schedule:
    # Run daily at 8:00 AM UTC (4:00 PM HKT)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install pandas sqlite3 requests yfinance
          
      - name: Update market data
        run: |
          python scripts/macro_pipeline/daily_macro_snapshot.py
          
      - name: Update historical data
        run: |
          python scripts/macro_pipeline/history_backfill.py || echo "No new data"
          
      - name: Regenerate articles
        run: |
          python scripts/macro_pipeline/astro_page_builder.py
          
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/content/blog/ public/
          git commit -m "chore: daily data update $(date +%Y-%m-%d)" || echo "No changes"
          git push
