name: Daily QuantMacro Update

on:
  schedule:
    # Run daily at 8:00 AM UTC (4:00 PM HKT)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install pandas yfinance requests google-generativeai
          
      - name: Run historical data backfill
        run: |
          cd scripts/macro_pipeline
          python history_backfill.py || echo "No new data"
          
      - name: Generate Astro pages
        run: |
          cd scripts/macro_pipeline
          python astro_page_builder.py
          
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff-index --quiet HEAD || git commit -m "bot: daily data update $(date +%Y-%m-%d)"
          git push
