SPY_FOMC:
  asset: "SPY"
  event_type: "FOMC"
  thesis: "The S&P 500's reaction to FOMC rate decisions is heavily dictated by the preceding 30-day index trajectory. A 'buy the rumor, sell the fact' dynamic dominates when equities enter the meeting at all-time highs. Conversely, preemptive market fear often yields a powerful relief rally on inline dot-plot projections."
  what_changed_recently: "The market's focal point has pivoted from terminal rate pricing to the trajectory of quantitative tightening (QT) tapering."
  risk_watchouts: "Jerome Powell's press conference (30 minutes post-release) frequently reverses the initial algorithmic reaction, especially when the statement appears neutral but the Q&A shifts the market's view of cuts, QT tapering, or growth sensitivity. Breadth deterioration under an index-level bounce is a common warning that the first move is failing."
  execution_checklist:
    - "Hedge long portfolios with short-dated VIX call options 24h prior."
    - "Avoid initiating 0DTE (Zero Days to Expiration) option strategies during the first 15 minutes of the release."
    - "Analyze the initial sector rotation (e.g., Tech vs. Utilities) for duration risk clues."
  reviewed_at: "2026-03-03"
  status: "approved"
  indexing: "index"
